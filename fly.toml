app = "bluff-uno-game"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 100
    hard_limit = 150

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
